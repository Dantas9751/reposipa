<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIPA - Mapa Geoespacial</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <nav class="menu">
    <a href="index.html" class="logo">
      <i data-lucide="leaf" width="22" height="22"></i>
      SIPA
    </a>

    <ul class="links-menu">
      <li><a href="index.html">Início</a></li>
      <li><a href="leis.html">Leis</a></li>
      <li><a href="mapa.html" class="ativo">Mapa</a></li>
      <li><a href="#">FAQ</a></li>
      <li><a href="contato.html">Contato</a></li>
    </ul>

    <button class="acessibilidade" title="Acessibilidade">
      <i data-lucide="accessibility" width="30" height="30"></i>
    </button>
  </nav>

  <main class="conteudo">

    <section class="secao-mapa">

      <h1 class="titulo-mapa" id="titulo-mapa">
      <i data-lucide="map" width="32" height="32"></i>
        Mapa Geoespacial
      </h1>

      <search class="controles">

        <form class="busca" role="search">
          <input
            type="search"
            id="campo-busca"
            class="campo-busca"
            placeholder="Buscar coordenada ou endereço..."
          >

          <button class="btn-dark" type="submit">
            Buscar
          </button>
        </form>

        <button class="botao-historico" type="button">
          Acessar Histórico
          <i data-lucide="search" width="16" height="16"></i>
        </button>

      </search>

<figure class="area-mapa">

  <img
    src="./imagens/mapa.jpeg"
    alt="Mapa Geoespacial"
    class="imagem-mapa"
  >

  <aside class="legenda">

    <h2 class="titulo-legenda">
      <i data-lucide="layers" width="15" height="15"></i>
      Camadas
    </h2>

    <ul>
      <li class="item-legenda">
        <span class="ponto azul"></span>
        Alerta de Desmatamento
      </li>

      <li class="item-legenda">
        <span class="ponto vermelho"></span>
        Área de Preservação
      </li>

      <li class="item-legenda">
        <span class="ponto amarelo"></span>
        Área de Reserva Legal
      </li>
    </ul>

  </aside>

</figure>

    </section>

  </main>

  <footer class="rodape">
    <p>© 2026 Sistema de Visualização Geoespacial – APP. Todos os direitos reservados.</p>
  </footer>

  <script>
    lucide.createIcons();
  </script>

</body>
</html>
